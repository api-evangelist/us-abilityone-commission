description: >-
  The US AbilityOne Commission is an independent federal agency that administers
  the AbilityOne Program, which creates employment opportunities for individuals
  who are blind or have significant disabilities. Operating under the Javits-Wagner-O'Day
  (JWOD) Act, the Commission maintains the AbilityOne Procurement List — a catalog
  of products and services that federal agencies are required to purchase from
  qualified nonprofit agencies employing people who are blind or have significant
  disabilities. The PLIMS (Procurement List Information Management System) provides
  web-based search access to the products and services list. Two central nonprofit
  agencies, NIB (National Industries for the Blind) and SourceAmerica, manage the
  affiliated nonprofit network.
specificationVersion: '0.19'
apis:
  - aid: us-abilityone-commission:procurement-list-api
    name: AbilityOne Procurement List API
    description: >-
      The Procurement List Information Management System (PLIMS) provides
      search access to the AbilityOne Procurement List — the catalog of
      products (identified by NSN) and services that federal agencies are
      mandated to procure from AbilityOne-participating nonprofit agencies.
      Supports search by NSN, product description, service type, agency,
      and nonprofit affiliate.
    humanURL: https://plims.abilityone.gov/search-products/
    baseURL: https://plims.abilityone.gov
