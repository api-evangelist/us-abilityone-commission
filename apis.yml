  - type: Features
    data:
      - name: Procurement List Search
        description: >-
          Web-based search of the AbilityOne Procurement List by NSN, product
          description, agency, and nonprofit affiliate via PLIMS.
      - name: Products List
        description: >-
          Searchable and downloadable catalog of products on the AbilityOne
          Procurement List, identified by National Stock Number (NSN).
      - name: Services List
        description: >-
          Searchable catalog of services on the AbilityOne Procurement List,
          organized by service category and performing nonprofit agency.
      - name: Nonprofit Agency Directory
        description: >-
          Directory of NIB-affiliated and SourceAmerica-affiliated nonprofit
          agencies that employ people who are blind or have significant disabilities.
      - name: Reports and Data Downloads
        description: >-
          Downloadable Excel reports of the Procurement List products and services,
          nonprofit agency rosters, and distributor lists.
  - type: UseCases
    data:
      - name: Federal Acquisition Compliance
        description: >-
          Federal contracting officers verifying mandatory source requirements
          for AbilityOne products and services before placing orders.
      - name: Procurement List Lookup
        description: >-
          Defense and civilian agencies searching by NSN to determine if a
          product must be procured through the AbilityOne program.
      - name: Nonprofit Agency Discovery
        description: >-
          Federal buyers identifying which nonprofit agency supplies a specific
          product or service in their geographic region.
      - name: Distributor Integration
        description: >-
          Authorized distributors accessing the Procurement List to maintain
          current product catalogs and pricing.
  - type: Integrations
    data:
      - name: NIB (National Industries for the Blind)
        description: >-
          Central nonprofit agency managing blind-employing organizations
          participating in the AbilityOne program.
      - name: SourceAmerica
        description: >-
          Central nonprofit agency managing organizations employing people
          with significant disabilities in the AbilityOne program.
      - name: GSA Advantage
        description: >-
          GSA procurement platform where AbilityOne products are listed
          and available for federal purchase.
      - name: SAM.gov
        description: >-
          System for Award Management integration for federal contract
          and acquisition data linked to AbilityOne awards.
      - name: FPDS
        description: >-
          Federal Procurement Data System tracking AbilityOne program
          spending and contract awards across federal agencies.
