naftiko: 1.0.0-alpha2
info:
  label: AbilityOne Procurement List API — Agencies
  description: 'AbilityOne Procurement List API — Agencies. 1 operations. Lead operation: AbilityOne List Nonprofit Agencies.
    Self-contained Naftiko capability covering one Us Abilityone Commission business surface.'
  tags:
  - Us Abilityone Commission
  - Agencies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_ABILITYONE_COMMISSION_API_KEY: US_ABILITYONE_COMMISSION_API_KEY
capability:
  consumes:
  - type: http
    namespace: abilityone-procurement-list-agencies
    baseUri: https://plims.abilityone.gov
    description: AbilityOne Procurement List API — Agencies business capability. Self-contained, no shared references.
    resources:
    - name: api-agencies
      path: /api/agencies
      operations:
      - name: listagencies
        method: GET
        description: AbilityOne List Nonprofit Agencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: affiliate
          in: query
          type: string
          description: Filter by central nonprofit agency affiliate
        - name: state
          in: query
          type: string
          description: Filter by state (2-letter abbreviation)
        - name: limit
          in: query
          type: integer
  exposes:
  - type: rest
    namespace: abilityone-procurement-list-agencies-rest
    port: 8080
    description: REST adapter for AbilityOne Procurement List API — Agencies. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/agencies
      name: api-agencies
      description: REST surface for api-agencies.
      operations:
      - method: GET
        name: listagencies
        description: AbilityOne List Nonprofit Agencies
        call: abilityone-procurement-list-agencies.listagencies
        with:
          affiliate: rest.affiliate
          state: rest.state
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: abilityone-procurement-list-agencies-mcp
    port: 9090
    transport: http
    description: MCP adapter for AbilityOne Procurement List API — Agencies. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: abilityone-list-nonprofit-agencies
      description: AbilityOne List Nonprofit Agencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: abilityone-procurement-list-agencies.listagencies
      with:
        affiliate: tools.affiliate
        state: tools.state
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
