naftiko: 1.0.0-alpha2
info:
  label: AbilityOne Procurement List API — Services
  description: 'AbilityOne Procurement List API — Services. 1 operations. Lead operation: AbilityOne Search Procurement List
    Services. Self-contained Naftiko capability covering one Us Abilityone Commission business surface.'
  tags:
  - Us Abilityone Commission
  - Services
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_ABILITYONE_COMMISSION_API_KEY: US_ABILITYONE_COMMISSION_API_KEY
capability:
  consumes:
  - type: http
    namespace: abilityone-procurement-list-services
    baseUri: https://plims.abilityone.gov
    description: AbilityOne Procurement List API — Services business capability. Self-contained, no shared references.
    resources:
    - name: api-services
      path: /api/services
      operations:
      - name: searchservices
        method: GET
        description: AbilityOne Search Procurement List Services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: serviceType
          in: query
          type: string
          description: Type of service
        - name: state
          in: query
          type: string
          description: State where service is performed (2-letter abbreviation)
        - name: nonprofit
          in: query
          type: string
          description: Filter by nonprofit affiliate
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
  exposes:
  - type: rest
    namespace: abilityone-procurement-list-services-rest
    port: 8080
    description: REST adapter for AbilityOne Procurement List API — Services. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/services
      name: api-services
      description: REST surface for api-services.
      operations:
      - method: GET
        name: searchservices
        description: AbilityOne Search Procurement List Services
        call: abilityone-procurement-list-services.searchservices
        with:
          serviceType: rest.serviceType
          state: rest.state
          nonprofit: rest.nonprofit
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: abilityone-procurement-list-services-mcp
    port: 9090
    transport: http
    description: MCP adapter for AbilityOne Procurement List API — Services. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: abilityone-search-procurement-list-services
      description: AbilityOne Search Procurement List Services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: abilityone-procurement-list-services.searchservices
      with:
        serviceType: tools.serviceType
        state: tools.state
        nonprofit: tools.nonprofit
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
